name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
            ext: ""
            archive: tar.gz
          - os: darwin
            arch: arm64
            ext: ""
            archive: tar.gz
          - os: linux
            arch: amd64
            ext: ""
            archive: tar.gz
          - os: linux
            arch: arm64
            ext: ""
            archive: tar.gz
          - os: windows
            arch: amd64
            ext: ".exe"
            archive: zip
          - os: windows
            arch: arm64
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: .claude/skills/webmind-export/scripts/go.mod

      - name: Build binary
        working-directory: .claude/skills/webmind-export/scripts
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o webmind-export${{ matrix.ext }} .

      - name: Prepare archive contents
        run: |
          ARCHIVE_NAME="webmind-export-${{ github.event.release.tag_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp .claude/skills/webmind-export/scripts/webmind-export${{ matrix.ext }} "${ARCHIVE_NAME}/"
          cp LICENSE "${ARCHIVE_NAME}/"
          cp README.md "${ARCHIVE_NAME}/"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "$GITHUB_ENV"

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        run: |
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"
          echo "ARCHIVE_FILE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Create zip archive
        if: matrix.archive == 'zip'
        run: |
          zip -r "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}/"
          echo "ARCHIVE_FILE=${ARCHIVE_NAME}.zip" >> "$GITHUB_ENV"

      - name: Generate checksum
        run: |
          sha256sum "${ARCHIVE_FILE}" > "${ARCHIVE_FILE}.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${ARCHIVE_FILE}" \
            "${ARCHIVE_FILE}.sha256"

  checksum:
    name: Generate checksum manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all sha256 files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "*.sha256" \
            --dir checksums

      - name: Combine into checksums.txt
        run: |
          cat checksums/*.sha256 | sort > checksums.txt

      - name: Upload checksums.txt
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" checksums.txt --clobber

      - name: Clean up individual sha256 files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for f in checksums/*.sha256; do
            gh release delete-asset "${{ github.event.release.tag_name }}" "$(basename "$f")" --yes
          done
